version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secret

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on: [rabbitmq, service1, service2, service3]

  service1:
    build: ./service1        # Java Spring Boot
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: secret
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres1:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
    depends_on: [rabbitmq, postgres1]

  service2:
    build: ./service2        # Node.js
    ports:
      - "8081:8081"
    environment:
      RABBITMQ_URL: amqp://admin:secret@rabbitmq:5672
      MONGODB_URL: mongodb://mongo1:27017/service1db  # ← ajouté ici
    depends_on: [rabbitmq, mongo1]

  service3:
    build: ./service3        # Python
    ports:
      - "8082:8082"
    environment:
      RABBITMQ_URL: amqp://admin:secret@rabbitmq:5672
      DATABASE_URL: postgresql+asyncpg://postgres:secret@postgres2:5432/service3db
    depends_on: [rabbitmq, postgres2]

  mongo1:
    image: mongo:7
    ports:
      - "27017:27017"

  postgres1:
    image: postgres:16
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret

  postgres2:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: service3db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
  frontend:
    build: ./my-app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - gateway